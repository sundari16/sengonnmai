name: Weekly ETL Pipeline
on:
  schedule:
    - cron: '0 20 * * 0'
  workflow_dispatch:

jobs:
  run-etl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install groq supabase requests \
            python-dotenv pdfplumber

      - name: Run budget pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python etl/pipelines/run_pipeline.py --source budget

      - name: Run gazette pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python etl/pipelines/run_pipeline.py --source gazette

      - name: Run schemes pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python etl/pipelines/run_pipeline.py --source schemes

      - name: Done
        run: echo "Pipeline complete. Review at /admin"
